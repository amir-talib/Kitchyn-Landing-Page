<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <filter id="sh-blue">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="rgba(0,0,0,0.25)"/>
    </filter>
  </defs>

  <!-- Mini bar chart — bottom right -->
  <g transform="translate(600,400) rotate(5)" filter="url(#sh-blue)">
    <rect x="0"   y="70" width="22" height="50" rx="4" fill="rgba(255,255,255,0.6)"/>
    <rect x="28"  y="45" width="22" height="75" rx="4" fill="rgba(255,255,255,0.8)"/>
    <rect x="56"  y="55" width="22" height="65" rx="4" fill="rgba(255,255,255,0.7)"/>
    <rect x="84"  y="20" width="22" height="100" rx="4" fill="white"/>
    <rect x="112" y="35" width="22" height="85" rx="4" fill="rgba(255,255,255,0.75)"/>
  </g>

  <!-- +35% badge — top left -->
  <g transform="translate(25,45) rotate(-5)" filter="url(#sh-blue)">
    <rect width="120" height="44" rx="22" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
    <text x="60" y="28" text-anchor="middle" fill="white" font-family="system-ui,-apple-system,sans-serif" font-weight="700" font-size="17">+35%</text>
  </g>

  <!-- Orders by Day label — top right -->
  <g transform="translate(565,50) rotate(4)" filter="url(#sh-blue)">
    <rect width="185" height="38" rx="10" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <text x="92" y="24" text-anchor="middle" fill="white" font-family="system-ui,-apple-system,sans-serif" font-weight="600" font-size="13">Orders by Day</text>
  </g>

  <!-- Trending arrow — left center -->
  <g transform="translate(30,290) rotate(-6)" filter="url(#sh-blue)">
    <rect width="160" height="44" rx="13" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
    <text x="80" y="27" text-anchor="middle" fill="white" font-family="system-ui,-apple-system,sans-serif" font-weight="600" font-size="14">Trending up</text>
  </g>

  <!-- 137 orders — bottom left -->
  <g transform="translate(18,510) rotate(-3)" filter="url(#sh-blue)">
    <rect width="150" height="38" rx="10" fill="rgba(255,255,255,0.18)" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
    <text x="75" y="24" text-anchor="middle" fill="white" font-family="system-ui,-apple-system,sans-serif" font-weight="700" font-size="14">137 orders</text>
  </g>
</svg>
