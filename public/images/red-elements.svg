<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <filter id="sh-red">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="rgba(0,0,0,0.25)"/>
    </filter>
  </defs>

  <!-- Assign Rider button — top right -->
  <g transform="translate(560,32) rotate(5)" filter="url(#sh-red)">
    <rect width="205" height="52" rx="16" fill="#7B2D8B"/>
    <text x="102" y="33" text-anchor="middle" fill="white" font-family="system-ui,-apple-system,sans-serif" font-weight="700" font-size="16">Assign Rider</text>
  </g>

  <!-- In Transit badge — top left -->
  <g transform="translate(22,44) rotate(-5)" filter="url(#sh-red)">
    <rect width="160" height="40" rx="20" fill="rgba(255,255,255,0.18)" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
    <text x="80" y="25" text-anchor="middle" fill="white" font-family="system-ui,-apple-system,sans-serif" font-weight="700" font-size="14">In Transit</text>
  </g>

  <!-- Location pin — left center (SVG path) -->
  <g transform="translate(35,230) rotate(-4)" filter="url(#sh-red)">
    <ellipse cx="28" cy="28" rx="28" ry="28" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
    <ellipse cx="28" cy="24" rx="12" ry="12" fill="none" stroke="white" stroke-width="2.5"/>
    <path d="M28 36 L28 48" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="28" cy="24" r="4" fill="white"/>
  </g>

  <!-- Order number tag — right center -->
  <g transform="translate(600,260) rotate(5)" filter="url(#sh-red)">
    <rect width="155" height="44" rx="13" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <text x="77" y="26" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-family="system-ui,-apple-system,sans-serif" font-weight="500" font-size="11">#TC-1100</text>
  </g>

  <!-- 1 active pill — bottom right -->
  <g transform="translate(615,505) rotate(4)" filter="url(#sh-red)">
    <rect width="140" height="36" rx="18" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
    <text x="70" y="23" text-anchor="middle" fill="white" font-family="system-ui,-apple-system,sans-serif" font-weight="700" font-size="13">1 active</text>
  </g>

  <!-- Delivery label — bottom left -->
  <g transform="translate(14,508) rotate(-3)" filter="url(#sh-red)">
    <rect width="175" height="36" rx="10" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
    <text x="87" y="23" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-family="system-ui,-apple-system,sans-serif" font-weight="600" font-size="13">Delivery Network</text>
  </g>
</svg>
