<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <filter id="sh-brown">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="rgba(0,0,0,0.25)"/>
    </filter>
  </defs>

  <!-- Order now button — top right -->
  <g transform="translate(575,28) rotate(6)" filter="url(#sh-brown)">
    <rect width="195" height="52" rx="16" fill="#C1440E"/>
    <text x="97" y="33" text-anchor="middle" fill="white" font-family="system-ui,-apple-system,sans-serif" font-weight="700" font-size="17">Order now</text>
  </g>

  <!-- View menu button — left center -->
  <g transform="translate(18,230) rotate(-5)" filter="url(#sh-brown)">
    <rect width="170" height="48" rx="14" fill="rgba(255,255,255,0.18)" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
    <text x="85" y="29" text-anchor="middle" fill="white" font-family="system-ui,-apple-system,sans-serif" font-weight="600" font-size="15">View menu</text>
  </g>

  <!-- 35 min badge — top left -->
  <g transform="translate(28,55) rotate(-4)" filter="url(#sh-brown)">
    <rect width="108" height="34" rx="17" fill="rgba(255,255,255,0.18)" stroke="rgba(255,255,255,0.45)" stroke-width="1"/>
    <text x="54" y="22" text-anchor="middle" fill="white" font-family="system-ui,-apple-system,sans-serif" font-weight="600" font-size="13">35 min</text>
  </g>

  <!-- Min N30 badge — bottom right -->
  <g transform="translate(616,508) rotate(5)" filter="url(#sh-brown)">
    <rect width="128" height="34" rx="17" fill="rgba(255,255,255,0.18)" stroke="rgba(255,255,255,0.45)" stroke-width="1"/>
    <text x="64" y="22" text-anchor="middle" fill="white" font-family="system-ui,-apple-system,sans-serif" font-weight="600" font-size="13">Min N30</text>
  </g>

  <!-- The Copper Pot label — bottom left -->
  <g transform="translate(14,498) rotate(-3)" filter="url(#sh-brown)">
    <rect width="195" height="40" rx="10" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <text x="97" y="25" text-anchor="middle" fill="white" font-family="system-ui,-apple-system,sans-serif" font-weight="700" font-size="13">The Copper Pot</text>
  </g>
</svg>
