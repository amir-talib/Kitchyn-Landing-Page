<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <filter id="sh-black">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="rgba(0,0,0,0.4)"/>
    </filter>
  </defs>

  <!-- Delivered badge — top right -->
  <g transform="translate(590,35) rotate(6)" filter="url(#sh-black)">
    <rect width="165" height="40" rx="20" fill="rgba(74,197,118,0.25)" stroke="rgba(74,197,118,0.6)" stroke-width="1.5"/>
    <text x="82" y="25" text-anchor="middle" fill="#4AC576" font-family="system-ui,-apple-system,sans-serif" font-weight="700" font-size="14">Delivered</text>
  </g>

  <!-- Avatar + name — top left -->
  <g transform="translate(22,30) rotate(-4)" filter="url(#sh-black)">
    <circle cx="20" cy="20" r="20" fill="#5a189a"/>
    <text x="20" y="26" text-anchor="middle" fill="white" font-family="system-ui,-apple-system,sans-serif" font-weight="700" font-size="16">A</text>
    <rect x="48" y="4" width="130" height="32" rx="8" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
    <text x="113" y="24" text-anchor="middle" fill="white" font-family="system-ui,-apple-system,sans-serif" font-weight="600" font-size="13">Amir Talib</text>
  </g>

  <!-- Total Spent — left center -->
  <g transform="translate(16,260) rotate(-5)" filter="url(#sh-black)">
    <rect width="180" height="56" rx="13" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
    <text x="90" y="22" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-family="system-ui,-apple-system,sans-serif" font-weight="500" font-size="11">TOTAL SPENT</text>
    <text x="90" y="43" text-anchor="middle" fill="white" font-family="system-ui,-apple-system,sans-serif" font-weight="700" font-size="16">N32,214.80</text>
  </g>

  <!-- 4 Orders pill — bottom right -->
  <g transform="translate(610,500) rotate(4)" filter="url(#sh-black)">
    <rect width="140" height="38" rx="19" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
    <text x="70" y="24" text-anchor="middle" fill="white" font-family="system-ui,-apple-system,sans-serif" font-weight="700" font-size="14">4 Orders</text>
  </g>

  <!-- Member since — bottom left -->
  <g transform="translate(14,508) rotate(-3)" filter="url(#sh-black)">
    <rect width="200" height="36" rx="10" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
    <text x="100" y="23" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-family="system-ui,-apple-system,sans-serif" font-weight="500" font-size="12">Member since Apr 2026</text>
  </g>
</svg>
